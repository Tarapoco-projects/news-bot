name: Run News Bot

on:
  schedule:
    # Shifted to off-peak minutes (12, 27, 42, 57) to avoid congested queues
    - cron: '12,27,42,57 * * * *'
  
  # Temporarily add "push" to force-register the schedule with GitHub's backend
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Upgraded to 3.12 to address the EOL warning

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python news_bot.py

      - name: Commit and Push Cache Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add processed_urls.json || true
          
          if git diff --staged --quiet; then
            echo "No new changes to commit."
          else
            git commit -m "chore: update processed articles cache"
            git push origin main
          fi
