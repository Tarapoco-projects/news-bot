name: Run News Bot

on:
  schedule:
    - cron: '*/15 * * * *'  # Runs every 15 minutes
  workflow_dispatch:        # Allows manually triggering from the GitHub Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Essential for allowing the Action to push cache commits
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python news_bot.py

      - name: Commit and Push Cache Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add processed_urls.json || true
          
          # Check if there are changes before committing
          if git diff --staged --quiet; then
            echo "No new articles found. Cache is already up to date."
          else
            git commit -m "chore: update processed articles cache [skip ci]"
            git push origin main
          fi
